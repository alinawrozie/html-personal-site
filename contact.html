<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Contact Me | Abdul Ali Nawrozie</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #334155;
      background-color: #f8fafc;
      line-height: 1.6;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    h1 {
      font-size: 2rem;
      color: #0f172a;
      margin-top: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
    }

    p {
      margin: 0.5rem 0;
      font-size: 1.05rem;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .back-link {
      margin-bottom: 2rem;
      display: inline-block;
    }

    form {
      margin-top: 2rem;
      background: #f8fafc;
      padding: 24px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      margin-bottom: 1.25rem;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 0.95rem;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    input[type="submit"] {
      background-color: #2563eb;
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      width: 100%;
    }

    input[type="submit"]:hover {
      background-color: #1d4ed8;
    }

    .contact-details {
      margin-bottom: 2rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <a class="back-link" href="index.html">← Back to Portfolio</a>
    
    <h1>Contact Details</h1>
    
    <div class="contact-details">
      <p><strong>Mobile:</strong> xxxxxx</p>
      <p><strong>Email:</strong> [xxxxxx@gmail.com]</p>
      <p><strong>LinkedIn:</strong> <a href="https://linkedin.com/in/ali-nawrozie" target="_blank">LinkedIn Profile</a></p>
      <p><strong>Website:</strong> <a href="http://nawrozie.com" target="_blank">nawrozie.com</a></p>
    </div>

    <form action="mailto:[EMAIL_ADDRESS]" method="post" enctype="text/plain">
      <label for="name">Your Name:</label>
      <input type="text" id="name" name="name" placeholder="John Doe" required>
      
      <label for="email">Your Email:</label>
      <input type="email" id="email" name="email" placeholder="john@example.com" required>
      
      <label for="message">Your Message:</label>
      <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
      
      <input type="submit" value="Send Message">
    </form>
  </div>
</body>

</html>
